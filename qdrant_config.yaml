# Qdrant Production Configuration
# For development, defaults are fine. 
# See https://qdrant.tech/documentation/guides/configuration/ for all options

server:
  http_port: 6333
  grpc_port: 6334

storage:
  storage_path: ./storage
  snapshots_path: ./snapshots
  wal_path: ./wal
  temp_path: ./temp

performance:
  max_search_threads: 0  # 0 = use all CPU cores

