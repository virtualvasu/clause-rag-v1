version: '3.8'

services:
  # Qdrant - Vector Database
  qdrant:
    image: qdrant/qdrant:latest
    container_name: clause-qdrant
    ports:
      - "6333:6333"  # REST API
      - "6334:6334"  # gRPC (optional)
    volumes:
      - qdrant_storage:/qdrant/storage
      - ./qdrant_config.yaml:/qdrant/config/production.yaml:ro
    environment:
      - QDRANT_API_KEY=${QDRANT_API_KEY:-}  # Optional, leave empty for dev
      - QDRANT_LOG_LEVEL=info
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks:
      - clause-network

  # Neo4j - Knowledge Graph Database
  neo4j:
    image: neo4j:latest
    container_name: clause-neo4j
    ports:
      - "7687:7687"  # Bolt protocol (for queries)
      - "7474:7474"  # Browser UI (http://localhost:7474)
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - ./neo4j_conf:/conf:ro
    environment:
      - NEO4J_AUTH=neo4j/clause-password
      - NEO4J_PLUGINS=["apoc"]  # APOC library for advanced queries
      - NEO4J_dbms_memory_heap_max__size=1G
      - NEO4J_server_default__address__usage=NEO4J_ACCEPT_LICENSE_AGREEMENT
      - NEO4J_ACCEPT_LICENSE_AGREEMENT=yes
      - NEO4J_dbms_logs_query_enabled=true
      - NEO4J_dbms_logs_query_log__file=query.log
      - NEO4J_dbms_logs_query_threshold=0
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "clause-password", "RETURN 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    networks:
      - clause-network

  # FastAPI - REST API Server
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: clause-api
    ports:
      - "8000:8000"
    volumes:
      - .:/app  # Bind mount for live code reload
      - /app/__pycache__  # Exclude pycache from bind mount
    environment:
      # Qdrant Configuration
      - QDRANT_URL=http://qdrant:6333
      - QDRANT_API_KEY=${QDRANT_API_KEY:-}
      
      # Neo4j Configuration
      - NEO4J_URL=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=clause-password
      
      # API Configuration
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=INFO
      
      # LLM Keys (add these in .env file)
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - COHERE_API_KEY=${COHERE_API_KEY:-}
    
    depends_on:
      qdrant:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    
    restart: unless-stopped
    networks:
      - clause-network

# Named volumes for data persistence
volumes:
  qdrant_storage:
    driver: local
  neo4j_data:
    driver: local
  neo4j_logs:
    driver: local

# Custom network for inter-service communication
networks:
  clause-network:
    driver: bridge
